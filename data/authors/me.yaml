role: PhD Student at Columbia University
bio: |
  Aaron (they/them) is a PhD student in Sustainable Development at Columbia University specializing in the applications of machine learning and econometrics to address climate and conflict shocks. Leveraging their background monitoring and evaluating international development projects in South Africa, Colombia and Ukraine, their research utilizes high-resolution geospatial data to advance causal inference in development economics. Their academic foundation includes an MS in Computer Science from Georgia Tech, an MS in Mathematics from Indiana State University, and an MS in Development Practice from UC Berkeley. Previously, Aaron served for over five years as a diplomat with the US Agency for International Development (USAID), as well as a Fulbright Scholar conducting labor economics research in Germany.

