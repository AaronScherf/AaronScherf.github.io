name: Deploy website to GitHub Pages
on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  config:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    outputs:
      deploy-host: ${{ steps.check.outputs.host }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            hugoblox.yaml
          sparse-checkout-cone-mode: false
      - id: check
        run: echo "host=github-pages" >> "$GITHUB_OUTPUT"

  build:
    needs: config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install --no-audit --no-fund || (npm init -y && npm install --save-dev tailwindcss @tailwindcss/cli @tailwindcss/typography)

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Static Site
        run: hugo --minify

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: [config, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true
          token: ${{ github.token }}